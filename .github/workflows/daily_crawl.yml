name: Daily Harness Engineering Crawler

on:
  # 每天北京时间 10:00 (UTC 02:00) 自动运行
  schedule:
    - cron: "0 2 * * *"
  # 支持手动触发（用于测试）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no commit)"
        required: false
        default: "false"

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update GitHub Stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stars.py

      - name: Run crawler pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python scripts/crawler.py

      - name: Build knowledge graph
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python scripts/build_graph.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Harness Bot 🤖"
          git config user.email "harness-bot@github-actions.com"
          git add data/
          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
          REPOS=$(python3 -c "import json; d=json.load(open('data/meta.json')); print(d['stats']['repositories'])")
          ARTICLES=$(python3 -c "import json; d=json.load(open('data/meta.json')); print(d['stats']['articles'])")
          git commit -m "🤖 Daily update: ${TIMESTAMP} | ${REPOS} repos, ${ARTICLES} articles"
          git push

      - name: No changes found
        if: steps.check_changes.outputs.has_changes != 'true'
        run: echo "No new resources found today."

  # 每周日运行一次完整的知识图谱重建
  rebuild_graph:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: crawl
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main  # 确保拿到最新数据

      - name: Check if Sunday
        id: check_sunday
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "7" ]; then
            echo "is_sunday=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python (Sunday only)
        if: steps.check_sunday.outputs.is_sunday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Sunday only)
        if: steps.check_sunday.outputs.is_sunday == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Full graph rebuild (Sunday only)
        if: steps.check_sunday.outputs.is_sunday == 'true'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python scripts/build_graph.py

      - name: Commit graph (Sunday only)
        if: steps.check_sunday.outputs.is_sunday == 'true'
        run: |
          git config user.name "Harness Bot 🤖"
          git config user.email "harness-bot@github-actions.com"
          git add data/graph.json
          git diff --staged --quiet || git commit -m "🕸️ Weekly graph rebuild: $(date -u '+%Y-%m-%d')"
          git push || true
