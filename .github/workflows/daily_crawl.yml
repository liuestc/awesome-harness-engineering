name: Daily Harness Engineering Pipeline

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - crawl_only
          - graph_only
          - digest_only
          - weekly_only

jobs:
  # ── 主日常 Pipeline ─────────────────────────────────────────────────────────
  daily_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Set up Node.js 20 (for Puppeteer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: scripts
        run: npm install

      - name: Install system fonts and Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser fonts-noto-cjk fonts-noto-color-emoji

      # ── Step 1: Crawl ────────────────────────────────────────────────────
      - name: "Step 1: Crawl new resources"
        if: ${{ github.event.inputs.mode != 'graph_only' && github.event.inputs.mode != 'digest_only' && github.event.inputs.mode != 'weekly_only' }}
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python scripts/crawler.py

      - name: "Step 1b: Update GitHub Stars"
        if: ${{ github.event.inputs.mode != 'graph_only' && github.event.inputs.mode != 'digest_only' && github.event.inputs.mode != 'weekly_only' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stars.py || echo "Stars update failed (non-critical)"

      # ── Step 2: Knowledge Graph ──────────────────────────────────────────
      - name: "Step 2: Build knowledge graph"
        if: ${{ github.event.inputs.mode != 'crawl_only' && github.event.inputs.mode != 'digest_only' && github.event.inputs.mode != 'weekly_only' }}
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python scripts/build_graph.py

      # ── Step 3: Semantic Search Index ───────────────────────────────────
      - name: "Step 3: Export semantic search index"
        if: ${{ github.event.inputs.mode != 'crawl_only' && github.event.inputs.mode != 'digest_only' && github.event.inputs.mode != 'weekly_only' }}
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python scripts/semantic_search.py export

      # ── Step 4: Daily Digest Cards ───────────────────────────────────────
      - name: "Step 4a: Generate digest content (MiniMax)"
        if: ${{ github.event.inputs.mode != 'crawl_only' && github.event.inputs.mode != 'graph_only' && github.event.inputs.mode != 'weekly_only' }}
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_digest.py

      - name: "Step 4b: Render digest cards (Puppeteer - 5 templates)"
        if: ${{ github.event.inputs.mode != 'crawl_only' && github.event.inputs.mode != 'graph_only' && github.event.inputs.mode != 'weekly_only' }}
        working-directory: scripts
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: node render_cards.js

      # ── Step 5: Weekly Insight (Sundays) ────────────────────────────────
      - name: "Step 5: Weekly insight (Sundays + manual)"
        if: ${{ github.event.inputs.mode == 'weekly_only' }}
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python scripts/weekly_insight.py

      - name: "Step 5b: Weekly insight (auto on Sundays)"
        if: ${{ github.event_name == 'schedule' }}
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "7" ]; then
            echo "Sunday detected, running weekly insight..."
            python scripts/weekly_insight.py
          else
            echo "Not Sunday (day=$DAY), skipping weekly insight"
          fi

      # ── Step 6: Commit & Push ────────────────────────────────────────────
      - name: "Step 6: Commit and push all updates"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Harness Bot 🤖"

          # Stage all data changes including digest images
          git add data/ || true
          find data/daily_digest -name "*.png" -exec git add {} \; 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit today."
          else
            DATE=$(date +%Y-%m-%d)
            REPOS=$(python3 -c "import json; print(len(json.load(open('data/repositories.json'))))" 2>/dev/null || echo "?")
            ARTICLES=$(python3 -c "import json; print(len(json.load(open('data/articles.json'))))" 2>/dev/null || echo "?")
            HEADLINE=$(python3 -c "import json; d=json.load(open('data/daily_digest/$(date +%Y-%m-%d)/digest.json')); print(d.get('content',{}).get('cover',{}).get('title',''))" 2>/dev/null || echo "")

            git commit -m "🤖 Daily update ${DATE}: ${REPOS} repos, ${ARTICLES} articles | 📰 ${HEADLINE} | 🕸️ Graph updated | 🔍 Search refreshed | 🎨 5 cards generated"

            git push
            echo "✅ All changes pushed to GitHub"
          fi

      # ── Failure Notification ─────────────────────────────────────────────
      - name: "Notify on failure"
        if: failure()
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python3 scripts/notify_failure.py || echo "Notification script not found, skipping"

  # ── 每周六：构建完整 Embedding 向量索引 ───────────────────────────────────
  weekly_embeddings:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'schedule' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: "Build full embeddings (Saturdays only)"
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "6" ]; then
            echo "Saturday: Building full semantic embeddings..."
            python scripts/semantic_search.py build
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "Harness Bot 🤖"
            git add data/embeddings.json
            git diff --staged --quiet || git commit -m "🧠 Weekly embeddings update $(date +%Y-%m-%d)"
            git push || true
          else
            echo "Not Saturday (day=$DAY), skipping embeddings build"
          fi
